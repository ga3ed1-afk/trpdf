<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio - Gemini Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>مساعد الذكاء الاصطناعي</h1>
            <p>مشغل بواسطة Google Gemini</p>
        </header>

        <main>
            <div id="chat-window" class="chat-window">
                <div class="message system">مرحباً! كيف يمكنني مساعدتك اليوم؟</div>
            </div>
            
            <div class="input-area">
                <textarea id="userInput" placeholder="اكتب سؤالك هنا..."></textarea>
                <button id="sendBtn">إرسال</button>
            </div>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
